# YAML demo
win:
  executableName: frogodoro
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  entitlementsInherit: null
  extendInfo:
    NSHighResolutionCapable: true
